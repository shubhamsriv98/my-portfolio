name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy build output to repo root for GitHub Pages
        run: |
          cp dist/index.dev.html index.html
          rm -rf assets images
          cp -r dist/assets assets
          cp -r dist/images images
          cp dist/logo.svg logo.svg
          cp dist/my_resume.pdf my_resume.pdf
          cp dist/.nojekyll .nojekyll

      - name: Commit and push built site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets/ images/ logo.svg my_resume.pdf .nojekyll
          git diff --staged --quiet || git commit -m "Deploy built site to root [skip ci]"
          git push
